name: test-web

on:
  pull_request:
    types: [opened, reopened, synchronize]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test-web:
    name: test-web
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      pull-requests: write  # カバレッジレポートを PR にコメントするため
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false
      - uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d  # v4.2.0
        with:
          install_args: node pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: test
        run: pnpm --filter @hono-poc/web test:coverage
      - name: Report coverage
        if: always()
        uses: davelosert/vitest-coverage-report-action@3c054a2d2e2ca45446417ad5d6d5eb33092af8f1  # v2.12.1
        with:
          working-directory: ./apps/web
          name: web
