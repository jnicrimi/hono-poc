name: drift

on:
  pull_request:
    types: [opened, reopened, synchronize]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  drizzle-check:
    name: drizzle-check
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1  # v7.0.1
        with:
          persist-credentials: false
      - uses: ./.github/actions/setup
      - name: Run drizzle-kit check
        run: pnpm --filter @hono-poc/api db:check
      - name: Generate migrations
        run: pnpm --filter @hono-poc/api db:generate
      - name: Check drift
        # --intent-to-add 未追跡の新規生成ファイルをインデックスに登録
        run: |
          git add --intent-to-add apps/api/drizzle
          git diff --exit-code -- apps/api/drizzle

  api-client-drift:
    name: api-client-drift
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1  # v7.0.1
        with:
          persist-credentials: false
      - uses: ./.github/actions/setup
      - name: Generate OpenAPI spec
        run: pnpm --filter @hono-poc/api openapi:generate
      - name: Generate API client
        run: pnpm --filter @hono-poc/web api:generate
      - name: Check drift
        # --intent-to-add 未追跡の新規生成ファイルをインデックスに登録
        run: |
          git add --intent-to-add apps/api/openapi.json apps/web/src/shared/api/generated
          git diff --exit-code -- apps/api/openapi.json apps/web/src/shared/api/generated
