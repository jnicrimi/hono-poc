name: test-api

on:
  pull_request:
    types: [opened, reopened, synchronize]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  unit:
    name: unit
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false
      - uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d  # v4.2.0
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: test
        run: pnpm --filter @hono-poc/api exec vitest run --project unit --coverage --reporter=dot --reporter=blob --outputFile.blob=.vitest-reports/unit.json
      - name: Upload blob report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: blob-unit
          path: apps/api/.vitest-reports/*
          include-hidden-files: true
          retention-days: 1
  coverage:
    name: coverage
    needs: [unit]
    if: ${{ !cancelled() }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      pull-requests: write  # カバレッジレポートを PR にコメントするため
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false
      - uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d  # v4.2.0
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Download blob reports
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          path: apps/api/.vitest-reports
          pattern: blob-*
          merge-multiple: true
      - name: Merge coverage
        run: pnpm --filter @hono-poc/api exec vitest run --merge-reports --coverage
      - name: Report coverage
        if: always()
        uses: davelosert/vitest-coverage-report-action@3c054a2d2e2ca45446417ad5d6d5eb33092af8f1  # v2.12.1
        with:
          working-directory: ./apps/api
          name: api
