[tools]
pnpm = "11.10.0"
node = "24.18.0"
actionlint = "1.7.12"
zizmor = "1.26.1"
gitleaks = "8.30.1"
lefthook = "2.1.9"

[env]
_.file = ".env"

[tasks.setup]
description = "環境基盤を最新化"
run = ["mise install", "lefthook install", "pnpm install --frozen-lockfile"]

[tasks.yamllint]
description = "YAML を検証"
raw_args = true
run = "uvx --python-preference only-managed yamllint==1.38.0"

[tasks.lint]
description = "Lint・整形の確認"
run = "pnpm exec biome check"

[tasks.fix]
description = "Lint・整形の修正"
run = "pnpm exec biome check --write"

[tasks.typecheck]
description = "型チェックを実行"
run = "pnpm typecheck"

[tasks.depcruise]
description = "依存関係の境界ルールを検証"
run = "pnpm --filter @hono-poc/api depcruise"

[tasks.dev]
description = "開発サーバを起動"
run = "trap 'exit 0' INT TERM; pnpm dev"

[tasks.build]
description = "ビルドを実行"
run = "pnpm build"

[task_config]
includes = [
  "mise-tasks/api-client.toml",
  "mise-tasks/db.toml",
  "mise-tasks/test-api.toml",
  "mise-tasks/vendor.toml",
  "mise-tasks/view.toml",
]
