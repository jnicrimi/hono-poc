commit-msg:
  commands:
    commitlint:
      run: pnpm exec commitlint --edit {1}

pre-commit:
  parallel: true
  commands:
    gitleaks:
      run: gitleaks git --pre-commit --staged
    biome:
      run: pnpm exec biome check --staged --no-errors-on-unmatched
    markdownlint:
      glob: "*.md"
      run: pnpm exec markdownlint-cli2 {staged_files}
    stylelint:
      glob: "*.css"
      run: pnpm exec stylelint {staged_files}
    yamllint:
      glob: "*.{yml,yaml}"
      run: mise run yamllint --strict {staged_files}
    actionlint:
      glob: ".github/workflows/*.{yml,yaml}"
      run: actionlint {staged_files}
    zizmor:
      glob: ".github/workflows/*.{yml,yaml}"
      run: zizmor --persona=pedantic --offline {staged_files}
    taplo:
      glob: "*.toml"
      run: pnpm exec taplo fmt --check {staged_files}
    drizzle-check:
      glob: "apps/api/drizzle/*"
      run: pnpm --filter @hono-poc/api db:check
    typecheck:
      glob: "*.{ts,tsx}"
      run: pnpm typecheck
    depcruise:
      glob: "apps/api/src/*.ts"
      run: pnpm --filter @hono-poc/api depcruise

pre-push:
  parallel: true
  commands:
    gitleaks:
      run: gitleaks git --log-opts "origin/main..HEAD"
    test-unit:
      run: pnpm --filter @hono-poc/api test:unit
    test-api:
      run: pnpm --filter @hono-poc/api test:api
    test-web:
      run: pnpm --filter @hono-poc/web test
